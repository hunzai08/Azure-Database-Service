<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <title>HR Dashboard - Regions</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.x -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-person-badge-fill me-2"></i>HR Dashboard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavId"
                aria-controls="collapsibleNavId" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="collapsibleNavId">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" aria-current="page">Regions</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Employees</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="dropdownId" data-bs-toggle="dropdown"
                            aria-haspopup="true" aria-expanded="false">Management</a>
                        <div class="dropdown-menu" aria-labelledby="dropdownId">
                            <a class="dropdown-item" href="#">Departments</a>
                            <a class="dropdown-item" href="#">Jobs</a>
                        </div>
                    </li>
                </ul>
                <div class="d-flex">
                    <input class="form-control me-2" type="search" id="searchRegionInput" placeholder="Search region..." aria-label="Search" oninput="filterRegions()" />
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="container my-5">
        <div class="row g-4">
            <!-- Region Management Form Side -->
            <div class="col-md-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 text-secondary fw-semibold" id="formTitle">Add New Region</h5>
                    </div>
                    <div class="card-body">
                        <form id="regionForm">
                            <div class="mb-3">
                                <label for="regionname" class="form-label text-muted small">Region Name</label>
                                <input type="text" class="form-control" id="regionname" required placeholder="e.g. North America">
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" id="submitBtn" class="btn btn-primary">
                                    <i class="bi bi-plus-circle me-1"></i> Save Region
                                </button>
                                <button type="button" id="cancelEditBtn" class="btn btn-outline-secondary d-none" onclick="resetFormState()">
                                    Cancel Edit
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Regions Display Data Side -->
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 text-secondary fw-semibold">Registered Regions</h5>
                        <button class="btn btn-sm btn-outline-primary" onclick="getRegion()">
                            <i class="bi bi-arrow-clockwise me-1"></i> Refresh
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-striped mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th scope="col" class="ps-4" style="width: 25%;">Region ID</th>
                                        <th scope="col" style="width: 50%;">Region Name</th>
                                        <th scope="col" class="text-end pe-4" style="width: 25%;">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="regionData">
                                    <!-- Dynamic content loads here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap Bundle with Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Application Script -->
    <script>
        const BASE_URL = "https://fantastic-palm-tree-qrwqrgvg57j24579-3000.app.github.dev/regions";
        let currentRegionId = null; // Stores ID if updating an object
        let cachedRegions = []; // Stores downloaded data for offline client search filtering

        // Handle Form Submission (Create or Update)
        document.getElementById('regionForm').addEventListener("submit", async (e) => {
            e.preventDefault();
            const regionName = document.getElementById('regionname').value;
            const submitBtn = document.getElementById('submitBtn');
            
            // UI Loading indicator
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="spinner-border spinner-border-sm me-1" role="status"></span> Saving...`;

            try {
                if (currentRegionId) {
                    // UPDATE Request
                    const response = await fetch(`${BASE_URL}/${currentRegionId}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ region_name: regionName })
                    });
                    if (!response.ok) throw new Error("Failed to update data.");
                } else {
                    // CREATE Request
                    const response = await fetch(`${BASE_URL}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ region_name: regionName })
                    });
                    if (!response.ok) throw new Error("Failed to create data.");
                }

                resetFormState();
                getRegion();
            } catch (error) {
                alert(`Error: ${error.message}`);
                submitBtn.disabled = false;
                submitBtn.innerHTML = currentRegionId ? `<i class="bi bi-pencil-square me-1"></i> Update Region` : `<i class="bi bi-plus-circle me-1"></i> Save Region`;
            }
        });

        const tbody = document.getElementById('regionData');

        // Read Request (Fetch & Render Regions)
        async function getRegion() {
            tbody.innerHTML = `
                <tr>
                    <td colspan="3" class="text-center py-4 text-muted">
                        <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                        Fetching regional data...
                    </td>
                </tr>
            `;

            try {
                const response = await fetch(`${BASE_URL}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                cachedRegions = await response.json();
                renderTable(cachedRegions);

            } catch (error) {
                console.error("Fetch error:", error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="3" class="text-center py-4 text-danger">
                            <i class="bi bi-exclamation-triangle-fill me-2"></i>
                            Failed to load data. Please ensure your backend server is running.
                        </td>
                    </tr>
                `;
            }
        }

        // Render rows data helper 
        function renderTable(data) {
            tbody.innerHTML = "";

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center py-4 text-muted">No regions found.</td></tr>`;
                return;
            }

            let rowsHtml = "";
            data.forEach(region => {
                rowsHtml += `
                    <tr>
                        <td class="ps-4 fw-semibold text-secondary">${region.region_id}</td>
                        <td>${region.region_name}</td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-outline-secondary me-1" onclick="editRegionState('${region.region_id}', '${region.region_name.replace(/'/g, "\\'")}')">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteRegion('${region.region_id}')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = rowsHtml;
        }

        // Shift Form State into Edit mode
        function editRegionState(id, name) {
            currentRegionId = id;
            document.getElementById('regionname').value = name;
            document.getElementById('formTitle').innerText = "Edit Region";
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.className = "btn btn-warning text-dark";
            submitBtn.innerHTML = `<i class="bi bi-pencil-square me-1"></i> Update Region`;
            
            document.getElementById('cancelEditBtn').classList.remove('d-none');
        }

        // Resets the configuration layout to create mode
        function resetFormState() {
            currentRegionId = null;
            document.getElementById('regionForm').reset();
            document.getElementById('formTitle').innerText = "Add New Region";
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.className = "btn btn-primary";
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<i class="bi bi-plus-circle me-1"></i> Save Region`;
            
            document.getElementById('cancelEditBtn').classList.add('d-none');
        }

        // Delete Request logic
        async function deleteRegion(id) {
            if (!confirm("Are you sure you want to remove this region?")) return;

            try {
                const response = await fetch(`${BASE_URL}/${id}`, {
                    method: "DELETE"
                });

                if (!response.ok) throw new Error("Failed to delete resource item.");
                
                getRegion();
                if(currentRegionId === id) resetFormState();
            } catch (error) {
                alert(`Error deleting item: ${error.message}`);
            }
        }

        // Front-end local filtration search implementation
        function filterRegions() {
            const query = document.getElementById('searchRegionInput').value.toLowerCase();
            const filtered = cachedRegions.filter(r => 
                r.region_id.toString().toLowerCase().includes(query) || 
                r.region_name.toLowerCase().includes(query)
            );
            renderTable(filtered);
        }

        // Initial launch runtime trigger
        document.addEventListener("DOMContentLoaded", getRegion);
    </script>
</body>

</html>
